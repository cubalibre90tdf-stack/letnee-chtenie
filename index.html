<style>
:root,[data-theme="light"]{
  --bg:#faf7f2;--surface:#fffcf7;--surface2:#fff;
  --border:#e6dfd4;--text:#2a2218;--muted:#7a7168;--faint:#c2baad;
  --accent:#b85c2c;--accent-h:#8f4320;--accent-soft:#f5ede6;
  --green:#2a6e4f;--green-soft:#e5f0eb;
  --shadow:0 4px 20px rgba(60,40,20,0.09);--r:18px;
}
[data-theme="dark"]{
  --bg:#1a1610;--surface:#211e18;--surface2:#2a261e;
  --border:#3a352a;--text:#e8e0d4;--muted:#8a8278;--faint:#504840;
  --accent:#e8845a;--accent-h:#f0a07a;--accent-soft:#3a2418;
  --green:#4fa87a;--green-soft:#1a3028;
  --shadow:0 4px 20px rgba(0,0,0,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
img{display:block;max-width:100%;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.logo{display:flex;align-items:center;gap:10px;font-family:'Lora',serif;font-size:21px;font-weight:600;}
.toggle-btn{background:none;border:1px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;color:var(--muted);transition:all .18s;}
.toggle-btn:hover{background:var(--accent-soft);color:var(--accent);}
.hero{background:linear-gradient(135deg,var(--accent-soft) 0%,var(--surface) 60%);border-bottom:1px solid var(--border);padding:36px 20px 28px;}
.hero-inner{max-width:900px;margin:0 auto;}
.hero h1{font-family:'Lora',serif;font-size:clamp(26px,5vw,42px);line-height:1.15;margin-bottom:10px;}
.hero h1 em{font-style:normal;color:var(--accent);}
.hero p{color:var(--muted);font-size:16px;line-height:1.6;max-width:660px;margin-bottom:22px;}
.search-wrap{display:flex;gap:8px;max-width:620px;}
.search-wrap input{flex:1;padding:13px 18px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;font-family:'Nunito',sans-serif;background:var(--surface2);color:var(--text);outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--faint);}
.search-btn{padding:13px 20px;border-radius:12px;background:var(--accent);border:none;color:#fff;font-size:15px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .18s;white-space:nowrap;}
.search-btn:hover{background:var(--accent-h);}
.stats{margin-top:12px;font-size:14px;color:var(--muted);}
.stats strong{color:var(--accent);}
.filters{max-width:1140px;margin:22px auto 0;padding:0 20px;display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn{padding:7px 14px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .18s;}
.filter-btn.active,.filter-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
.grid{max-width:1140px;margin:20px auto 60px;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
.no-results{grid-column:1/-1;text-align:center;padding:48px;color:var(--muted);font-size:18px;}
.no-results strong{display:block;font-size:36px;margin-bottom:8px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;display:flex;flex-direction:column;gap:11px;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(60,40,20,0.13);}
.card-author{font-size:12px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);}
.card-title{font-family:'Lora',serif;font-size:19px;line-height:1.25;color:var(--text);}
.card-desc{font-size:14px;color:var(--muted);line-height:1.5;}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;}
.tag{padding:4px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:700;}
.tag.genre{background:var(--green-soft);color:var(--green);}
.card-actions{display:flex;gap:8px;flex-wrap:wrap;padding-top:2px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:700;border:1.5px solid var(--border);color:var(--text);background:var(--surface2);cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn.primary:hover{background:var(--accent-h);border-color:var(--accent-h);}
.btn.video{background:var(--green-soft);border-color:var(--green);color:var(--green);}
.btn.video:hover{background:var(--green);color:#fff;}
footer{text-align:center;padding:24px;color:var(--faint);font-size:13px;border-top:1px solid var(--border);}
@media(max-width:600px){
  .hero{padding:24px 16px 20px;}
  .grid{padding:0 12px;}
  .filters{padding:0 12px;}
  .search-wrap{flex-direction:column;}
  .search-btn{justify-content:center;}
}
</style>
</head>

const ALL_GENRES=[...new Set(books.map(b=>b.genre))].sort();
let currentGenre='Все';
let currentQuery='';

function render(){
  const q=currentQuery.toLowerCase().trim();
  const filtered=books.filter(b=>{
    const hay=(b.author+' '+b.title+' '+b.genre+' '+b.tags.join(' ')).toLowerCase();
    return(!q||hay.includes(q))&&(currentGenre==='Все'||b.genre===currentGenre);
  });
  const grid=document.getElementById('grid');
  document.getElementById('stats').innerHTML=`Найдено: <strong>${filtered.length}</strong> из ${books.length} произведений`;
  if(!filtered.length){
    grid.innerHTML='<div class="no-results"><strong>🔍</strong>Ничего не нашлось — попробуй другой запрос</div>';
    return;
  }
  grid.innerHTML=filtered.map(b=>{
    const readBtn=`<a class="btn primary" href="${b.read}" target="_blank" rel="noopener noreferrer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>Читать бесплатно</a>`;
    const videoBtn=b.video?`<a class="btn video" href="${b.video}" target="_blank" rel="noopener noreferrer"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>Мультфильм</a>`:'';
    const tags=[b.genre,...b.tags].map((tag,i)=>`<span class="tag${i===0?' genre':''}">${tag}</span>`).join('');
    return`<article class="card">
      <div class="card-author">${b.author}</div>
      <h2 class="card-title">${b.title}</h2>
      <p class="card-desc">${b.desc}</p>
      <div class="card-tags">${tags}</div>
      <div class="card-actions">${readBtn}${videoBtn}</div>
    </article>`;
  }).join('');
}

const filtersEl=document.getElementById('filters');
['Все',...ALL_GENRES].forEach(g=>{
  const btn=document.createElement('button');
  btn.className='filter-btn'+(g==='Все'?' active':'');
  btn.textContent=g;
  btn.addEventListener('click',()=>{
    currentGenre=g;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
  filtersEl.appendChild(btn);
});

const searchInput=document.getElementById('search');
searchInput.addEventListener('input',e=>{currentQuery=e.target.value;render();});
searchInput.addEventListener('keydown',e=>{if(e.key==='Enter'){currentQuery=e.target.value;render();}});
document.getElementById('searchBtn').addEventListener('click',()=>{currentQuery=searchInput.value;render();});
render();
</script>
